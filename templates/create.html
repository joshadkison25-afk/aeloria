<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aeloria — World Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/aeloria-cinematic.css?v=20260426-cine-1">
  <script defer src="/static/js/aeloria-cinematic.js?v=20260426-cine-1"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: rgba(201,169,110,1);
      --gold-dim: rgba(201,169,110,0.55);
      --bg: #04050a;
      --border: rgba(201,169,110,0.15);
      --text: #e8d9bc;
      --text-sec: rgba(232,217,188,0.65);
    }

    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: 'Crimson Text', serif; display: flex; flex-direction: column;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(120,80,30,0.14), transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(40,20,80,0.10), transparent 45%),
        linear-gradient(180deg, #04050a 0%, #060810 100%);
      pointer-events: none;
    }
    .bg-map {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('/static/illustrations/ui/heroes/create.png');
      background-size: cover; background-position: 50% 52%;
      opacity: 0.18; filter: saturate(1.0) contrast(1.18) brightness(0.55); pointer-events: none;
      animation: cineHeroBreathe 60s ease-in-out infinite alternate;
      transform-origin: 50% 50%;
    }

    /* ── Header ── */
    .header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(4,5,10,0.85); backdrop-filter: blur(12px); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .header-back {
      font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold-dim); text-decoration: none;
      border: 1px solid var(--border); padding: 6px 14px;
      transition: color 0.15s, border-color 0.15s;
    }
    .header-back:hover { color: var(--gold); border-color: var(--gold); }
    .header-title {
      font-family: 'Cinzel', serif; font-size: 18px; font-weight: 500;
      letter-spacing: 0.12em; color: var(--text);
    }
    .assigned-count {
      font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.1em; color: var(--gold-dim);
    }
    .assigned-count span { color: var(--gold); font-weight: 700; }

    /* ── Layout ── */
    .layout {
      position: relative; z-index: 10;
      display: grid; grid-template-columns: minmax(0,1fr) 300px;
      flex: 1; overflow: hidden; height: calc(100vh - 69px);
    }

    /* ── Region area ── */
    .region-area {
      overflow-y: auto; padding: 24px 28px 40px;
      scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.2) transparent;
    }

    .region-group { margin-bottom: 30px; }

    .region-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .region-terrain-icon { font-size: 18px; flex-shrink: 0; }
    .region-name {
      font-family: 'Cinzel', serif; font-size: 15px; font-weight: 500;
      letter-spacing: 0.08em; color: var(--text);
    }
    .region-terrain {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-sec); font-family: 'Cinzel', serif;
    }
    .region-assigned-badge {
      margin-left: auto; font-family: 'Cinzel', serif; font-size: 10px;
      letter-spacing: 0.08em; color: var(--gold);
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: none;
    }
    .region-assigned-badge.visible { display: block; }

    /* ── Faction cards row ── */
    .faction-row {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.15) transparent;
    }

    .faction-card {
      flex-shrink: 0; width: 164px;
      position: relative; cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(8,10,16,0.7);
      padding: 14px 14px 12px;
      transition: border-color 0.18s, transform 0.18s, background 0.18s;
      user-select: none;
    }
    .faction-card:hover {
      border-color: rgba(201,169,110,0.38); background: rgba(10,13,20,0.9); transform: translateY(-2px);
    }
    .faction-card.selected {
      border-color: var(--gold); background: rgba(14,12,8,0.9);
      box-shadow: 0 0 0 1px rgba(201,169,110,0.12), inset 0 0 24px rgba(201,169,110,0.04);
    }

    .card-check {
      position: absolute; top: 8px; right: 8px;
      width: 16px; height: 16px; border: 1px solid var(--gold); border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s;
      background: rgba(201,169,110,0.14); color: var(--gold); font-size: 10px;
    }
    .faction-card.selected .card-check { opacity: 1; }

    .card-icon { font-size: 22px; line-height: 1; margin-bottom: 8px; }
    .card-species {
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gold-dim); margin-bottom: 4px;
      font-family: 'Cinzel', serif;
    }
    .card-name {
      font-family: 'Cinzel', serif; font-size: 13px; font-weight: 500;
      color: var(--text); margin-bottom: 4px; line-height: 1.3;
    }
    .card-role { font-size: 11px; color: var(--text-sec); line-height: 1.4; }
    .card-core {
      display: inline-block; margin-top: 8px;
      font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(201,169,110,0.5); border: 1px solid rgba(201,169,110,0.2); padding: 2px 6px;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-left: 1px solid var(--border); background: rgba(5,7,12,0.88);
      backdrop-filter: blur(10px); display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-section {
      padding: 20px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sidebar-label {
      font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 12px;
    }
    .world-name-input {
      width: 100%; height: 38px; padding: 0 12px;
      border: 1px solid var(--border); background: rgba(4,5,10,0.8); color: var(--text);
      font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.06em;
      outline: none; transition: border-color 0.15s;
    }
    .world-name-input:focus { border-color: rgba(201,169,110,0.45); }
    .world-name-input::placeholder { color: rgba(201,169,110,0.3); }

    .assignment-list {
      flex: 1; overflow-y: auto; padding: 10px 20px;
      scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.15) transparent;
    }
    .assignment-item {
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .assignment-item:last-child { border-bottom: 0; }
    .assign-region {
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 2px;
    }
    .assign-faction { font-size: 13px; color: var(--text); }
    .assign-faction.empty { color: rgba(201,169,110,0.25); font-style: italic; }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .build-btn {
      width: 100%; height: 46px; border: 1px solid rgba(201,169,110,0.4);
      background: rgba(80,44,12,0.6); color: #f0e0c0; font-family: 'Cinzel', serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .build-btn:hover:not(:disabled) {
      background: rgba(110,60,14,0.8); border-color: rgba(201,169,110,0.7);
      box-shadow: 0 0 24px rgba(201,169,110,0.12);
    }
    .build-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .build-hint { margin-top: 8px; font-size: 11px; color: var(--gold-dim); text-align: center; line-height: 1.5; }

    /* ── Loading overlay ── */
    .loading-overlay {
      display: none; position: fixed; inset: 0; z-index: 200; background: rgba(4,5,10,0.94);
      align-items: center; justify-content: center; flex-direction: column; gap: 18px;
    }
    .loading-overlay.show { display: flex; }
    .loading-title {
      font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(201,169,110,0.82);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    .loading-dots { display: flex; gap: 8px; }
    .loading-dot {
      width: 5px; height: 5px; border-radius: 50%; background: rgba(201,169,110,0.6);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2){animation-delay:.2s}
    .loading-dot:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse{0%,100%{transform:scale(0.6);opacity:0.4}50%{transform:scale(1);opacity:1}}
  </style>
</head>
<body class="cine">
<div class="bg"></div>
<div class="bg-map"></div>

<header class="header">
  <div class="header-left">
    <a href="/menu" class="header-back">← Menu</a>
    <div class="header-title">World Creator</div>
  </div>
  <div class="assigned-count"><span id="assign-count">0</span> / <span id="total-count">0</span> regions assigned</div>
</header>

<div class="layout">
  <div class="region-area" id="region-area"></div>

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">World Name</div>
      <input class="world-name-input" id="world-name" type="text" placeholder="Name your world..." maxlength="48" spellcheck="false">
    </div>

    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;border-bottom:0;padding-bottom:0">
      <div class="sidebar-label">Region Assignments</div>
      <div class="assignment-list" id="assignment-list"></div>
    </div>

    <div class="sidebar-footer">
      <button class="build-btn" id="build-btn" type="button" disabled>Begin Simulation</button>
      <div class="build-hint" id="build-hint">Assign at least 3 regions to begin</div>
    </div>
  </aside>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-title">Building Your World</div>
  <div class="loading-dots">
    <div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>
  </div>
</div>

<script>
(function () {
  const MIN_REGIONS = 3;
  const assignments = {};
  let regions = [];

  const TERRAIN_ICONS = {
    'dense forest': '🌲', 'mountain': '⛰️', 'plains': '🌾',
    'coastal': '🌊', 'frozen': '❄️', 'stone plains': '🪨', 'rugged': '⚔️',
  };

  const SPECIES_ICONS = {
    'Dark Elf': '◈', 'High Elf': '✦', 'High Elf (Ancient)': '✦',
    'Human': '♛', 'Dwarf': '⚒', 'Orc': '⚔', 'Goblin': '◉',
    'Kenku': '🦅', 'Centaur': '🐎', 'Tortle': '🐢', 'Faeborn': '✨',
    'Vargai': '🐺', 'Ursari': '🐻', 'Frostwraith': '💀', 'Frost Fey': '❄',
    'Tideborn': '🌊', 'Roki': '🪨', 'Stonekin': '🪨', 'Kharox': '🐐',
    'Gravekin': '💀', 'Gritkin': '🐀', 'Scorpid': '🦂', 'Shaleborn': '🗿',
    'Skarren': '🦴', 'Multi-species': '◆', 'Sylthari': '🕸', 'Verdan': '🌿',
  };

  async function init() {
    const res = await fetch('/api/region-factions');
    regions = await res.json();
    document.getElementById('total-count').textContent = regions.length;
    renderRegions();
    updateSidebar();
  }

  function renderRegions() {
    const area = document.getElementById('region-area');
    area.innerHTML = '';
    regions.forEach(region => {
      const terrainIcon = TERRAIN_ICONS[region.terrain] || '◆';
      const group = document.createElement('div');
      group.className = 'region-group';
      group.dataset.region = region.name;
      group.innerHTML = `
        <div class="region-header">
          <span class="region-terrain-icon">${terrainIcon}</span>
          <span class="region-name">${esc(region.name)}</span>
          <span class="region-terrain">${esc(region.terrain)}</span>
          <span class="region-assigned-badge" id="badge-${esc(region.name)}"></span>
        </div>
        <div class="faction-row" id="row-${esc(region.name)}"></div>`;
      area.appendChild(group);

      const row = group.querySelector('.faction-row');
      region.factions.forEach(faction => {
        const icon = SPECIES_ICONS[faction.species] || '◆';
        const card = document.createElement('div');
        card.className = 'faction-card';
        card.dataset.region = region.name;
        card.dataset.faction = faction.name;
        card.innerHTML = `
          <div class="card-check">✓</div>
          <div class="card-icon">${icon}</div>
          <div class="card-species">${esc(faction.species)}</div>
          <div class="card-name">${esc(faction.name)}</div>
          <div class="card-role">${esc(faction.role)}</div>
          ${faction.is_canonical ? '<div class="card-core">Core</div>' : ''}`;
        card.addEventListener('click', () => select(region.name, faction.name, card));
        row.appendChild(card);
      });
    });
  }

  function select(regionName, factionName, clickedCard) {
    const row = document.getElementById('row-' + regionName);
    const already = assignments[regionName] === factionName;
    row.querySelectorAll('.faction-card').forEach(c => c.classList.remove('selected'));
    if (already) {
      delete assignments[regionName];
    } else {
      assignments[regionName] = factionName;
      clickedCard.classList.add('selected');
    }
    updateBadge(regionName);
    updateSidebar();
  }

  function updateBadge(regionName) {
    const badge = document.getElementById('badge-' + regionName);
    if (!badge) return;
    const assigned = assignments[regionName];
    badge.textContent = assigned || '';
    badge.classList.toggle('visible', !!assigned);
  }

  function updateSidebar() {
    const count = Object.keys(assignments).length;
    document.getElementById('assign-count').textContent = count;
    document.getElementById('assignment-list').innerHTML = regions.map(r => {
      const f = assignments[r.name];
      return `<div class="assignment-item">
        <div class="assign-region">${esc(r.name)}</div>
        <div class="assign-faction ${f ? '' : 'empty'}">${esc(f || '— unassigned —')}</div>
      </div>`;
    }).join('');
    const btn = document.getElementById('build-btn');
    btn.disabled = count < MIN_REGIONS;
    document.getElementById('build-hint').textContent = count < MIN_REGIONS
      ? `Assign at least ${MIN_REGIONS} regions to begin`
      : `${count} of ${regions.length} regions configured`;
  }

  document.getElementById('build-btn').addEventListener('click', async () => {
    if (Object.keys(assignments).length < MIN_REGIONS) return;
    const worldName = document.getElementById('world-name').value.trim() || 'Custom World';
    document.getElementById('loading-overlay').classList.add('show');
    try {
      const r = await fetch('/api/worlds/build', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ region_assignments: assignments, world_name: worldName })
      });
      if (!r.ok) throw new Error();
      setTimeout(() => { window.location.href = '/loading'; }, 300);
    } catch {
      document.getElementById('loading-overlay').classList.remove('show');
      alert('Failed to build world. Check the console.');
    }
  });

  function esc(t) {
    return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
})();
</script>
</body>
</html>
