<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Aeloria{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  {% block head %}{% endblock %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0e12;
      --surface:     #161618;
      --surface2:    #1e1e24;
      --surface3:    #252530;
      --border:      rgba(255,255,255,0.08);
      --border2:     rgba(255,255,255,0.12);
      --text:        #f0ead6;
      --text-sec:    #9a9080;
      --text-muted:  #5a5450;
      --red:         #c9372c;
      --red-dark:    #8a1a12;
      --red-dim:     rgba(201,55,44,0.15);
      --gold:        #c9a96e;
      --gold-dim:    rgba(201,169,110,0.15);
      --gold-dark:   #7a6040;
      --purple:      #7a5a9a;
      --link:        #a78bfa;
      --rising:      #4aad6a;
      --stable:      #5a7aaa;
      --declining:   #c08040;
      --critical:    #c04040;
      --nav-h:       60px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── NAVIGATION ─────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background:
        linear-gradient(180deg, rgba(0,0,0,0.72), rgba(8,10,14,0.46));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,169,110,0.14);
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.02);
      z-index: 1000;
      display: flex;
      align-items: center;
    }

    .nav-inner {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .nav-wordmark {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      color: #d9b77f;
      text-decoration: none;
      letter-spacing: 3px;
      flex-shrink: 0;
      margin-right: 40px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .nav-link {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(201,169,110,0.76);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      transition: color 0.15s ease, opacity 0.15s ease;
      white-space: nowrap;
      opacity: 0.82;
    }
    .nav-link:hover {
      color: #e3c28a;
      opacity: 1;
    }
    .nav-link.active {
      color: #f0d4a2;
      opacity: 1;
    }
    .nav-link.active::after {
      content: '';
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.95), transparent);
    }

    .nav-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .nav-date {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(240,234,214,0.74);
      line-height: 1.35;
      text-align: right;
    }

    .nav-tick-pill {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      background: rgba(10,10,14,0.34);
      border: 1px solid rgba(201,169,110,0.5);
      color: #e3c28a;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(201,169,110,0.08);
    }

    /* Hamburger */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      margin-left: auto;
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: rgba(201,169,110,0.72);
      transition: background 0.15s;
    }
    .nav-hamburger:hover span { background: #f0d4a2; }

    /* Mobile overlay nav */
    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0e;
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .nav-overlay.open { display: flex; }
    .nav-overlay .nav-link {
      font-size: 24px;
      padding: 16px 32px;
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
    }
    .nav-overlay-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 28px;
      cursor: pointer;
    }

    /* ── PAGE BODY ───────────────────────────────── */
    .page-body {
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ── SHARED LAYOUT ───────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section { padding: 80px 0; }
    .section-sm { padding: 48px 0; }

    .section-header { margin-bottom: 48px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .section-subtitle {
      font-size: 16px;
      color: var(--text-sec);
      max-width: 600px;
    }

    /* ── CARDS ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      position: relative;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--border2); }
    .card.card-accent:hover {
      border-left: 2px solid var(--gold);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card-grid-2 { grid-template-columns: repeat(2, 1fr); }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary {
      background: var(--red);
      color: #fff;
    }
    .btn-primary:hover { background: #a82d23; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
    }
    .btn-secondary:hover { background: var(--gold-dim); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 0;
    }
    .btn-ghost:hover { color: var(--text); text-decoration: underline; }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── MORALE BADGES ───────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
    }
    .badge-Rising    { background: rgba(26,58,26,0.8);  color: var(--rising);   border: 1px solid rgba(74,173,106,0.3); }
    .badge-Stable    { background: rgba(20,36,60,0.8);  color: var(--stable);   border: 1px solid rgba(90,122,170,0.3); }
    .badge-Declining { background: rgba(50,32,10,0.8);  color: var(--declining);border: 1px solid rgba(192,128,64,0.3); }
    .badge-Critical  { background: rgba(58,16,16,0.8);  color: var(--critical); border: 1px solid rgba(192,64,64,0.3); }
    .badge-neutral   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    /* ── POWER BARS ──────────────────────────────── */
    .power-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; margin-top: 16px; }
    .power-row  { display: flex; flex-direction: column; gap: 4px; }
    .power-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .power-label span { color: var(--text-sec); }
    .power-track { height: 2px; background: rgba(255,255,255,0.08); }
    .power-fill  { height: 100%; transition: width 0.6s ease; }
    .pf-mil { background: var(--red); }
    .pf-pol { background: var(--gold-dark); }
    .pf-eco { background: var(--rising); }
    .pf-inf { background: var(--purple); }

    /* ── SKELETON ────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── FADE IN ON SCROLL ───────────────────────── */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── TOAST ───────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-left: 2px solid var(--gold);
      color: var(--text-sec);
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 10px 18px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── PAGE HERO ───────────────────────────────── */
    .page-hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 64px 0 56px;
    }
    .page-hero .section-label { margin-bottom: 16px; }
    .page-hero .section-title { font-size: 48px; }

    /* ── DIVIDER ─────────────────────────────────── */
    hr.divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 960px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 680px) {
      .section { padding: 48px 0; }
      .card-grid, .card-grid-2 { grid-template-columns: 1fr; }
      .page-hero .section-title { font-size: 32px; }
      .section-title { font-size: 24px; }
      .nav-links, .nav-meta { display: none; }
      .nav-hamburger { display: flex; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-wordmark">AELORIA</a>
    <div class="nav-links">
      <a href="/"          class="nav-link {% if active_page == 'home' %}active{% endif %}">Home</a>
      <a href="/map"       class="nav-link {% if active_page == 'map' %}active{% endif %}">Map</a>
      <a href="/codex"     class="nav-link {% if active_page == 'codex' %}active{% endif %}">Codex</a>
      <a href="/factions"  class="nav-link {% if active_page == 'factions' %}active{% endif %}">Factions</a>
      <a href="/chronicle" class="nav-link {% if active_page == 'chronicle' %}active{% endif %}">Chronicle</a>
      <a href="/story"     class="nav-link {% if active_page == 'story' %}active{% endif %}">Story</a>
      <a href="/god"       class="nav-link {% if active_page == 'god' %}active{% endif %}">God Panel</a>
    </div>
    <div class="nav-meta">
      <span class="nav-date" id="nav-date">—</span>
      <span class="nav-tick-pill" id="nav-tick">Tick —</span>
    </div>
    <button class="nav-hamburger" onclick="openMobileNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- MOBILE NAV OVERLAY -->
<div class="nav-overlay" id="nav-overlay">
  <button class="nav-overlay-close" onclick="closeMobileNav()">×</button>
  <a href="/"          class="nav-link" onclick="closeMobileNav()">Home</a>
  <a href="/map"       class="nav-link" onclick="closeMobileNav()">Map</a>
  <a href="/codex"     class="nav-link" onclick="closeMobileNav()">Codex</a>
  <a href="/factions"  class="nav-link" onclick="closeMobileNav()">Factions</a>
  <a href="/chronicle" class="nav-link" onclick="closeMobileNav()">Chronicle</a>
  <a href="/story"     class="nav-link" onclick="closeMobileNav()">Story</a>
  <a href="/god"       class="nav-link" onclick="closeMobileNav()">God Panel</a>
</div>

<div class="page-body">
  {% block content %}{% endblock %}
</div>

<div id="toast"></div>

<script>
// Nav meta
async function loadNavMeta() {
  try {
    const r = await fetch('/api/state');
    const s = await r.json();
    const dateEl = document.getElementById('nav-date');
    const tickEl = document.getElementById('nav-tick');
    if (s.world_date) dateEl.textContent = s.world_date.split(',')[0].toUpperCase();
    if (s.tick !== undefined) tickEl.textContent = `Tick ${s.tick}`;
  } catch(e) {}
}
loadNavMeta();

function openMobileNav()  { document.getElementById('nav-overlay').classList.add('open'); }
function closeMobileNav() { document.getElementById('nav-overlay').classList.remove('open'); }

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// Scroll fade-in
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
{% block scripts %}{% endblock %}
</body>
</html>
