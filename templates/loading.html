<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aeloria — Shaping the World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/aeloria-cinematic.css?v=20260426-cine-1">
  <script defer src="/static/js/aeloria-cinematic.js?v=20260426-cine-1"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: rgba(201,169,110,1);
      --gold-dim: rgba(201,169,110,0.55);
      --bg: #04050a;
      --text: #e8d9bc;
      --text-sec: rgba(232,217,188,0.65);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', serif;
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-map {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('/static/illustrations/ui/heroes/loading.png');
      background-size: cover; background-position: 50% 52%;
      opacity: 0; filter: saturate(1.05) contrast(1.18) brightness(0.62);
      transition: opacity 2.4s ease;
      animation: cineHeroBreathe 60s ease-in-out infinite alternate;
      transform-origin: 50% 50%;
    }
    .bg-map.visible { opacity: 0.55; }

    .bg-vignette {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(4,5,10,0.85) 80%),
        radial-gradient(ellipse at 50% 0%, rgba(80,50,10,0.2), transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(4,5,10,0.9), transparent 50%);
      pointer-events: none;
    }

    .bg-seer {
      position: fixed; bottom: 0; right: 60px; z-index: 2;
      width: 420px; height: 520px;
      background-image: url('/static/illustrations/ui/seer-portrait.png');
      background-size: contain; background-position: bottom center; background-repeat: no-repeat;
      opacity: 0; transition: opacity 3s ease 1s;
      filter: saturate(0.4) brightness(0.6);
      mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    }
    .bg-seer.visible { opacity: 1; }

    /* ── Main content ── */
    .content {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      padding: 40px;
    }

    /* ── Title ── */
    .eyebrow {
      font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.55em;
      text-transform: uppercase; color: var(--gold-dim); margin-bottom: 18px;
      opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .main-title {
      font-family: 'Cinzel', serif; font-size: clamp(46px, 6.4vw, 88px);
      font-weight: 600; letter-spacing: 0.20em; text-indent: 0.20em; line-height: 1;
      margin-bottom: 14px;
      background: linear-gradient(180deg, #fff7df 0%, #f4ead0 28%, #e7c285 60%, #b8893f 86%, #7a5520 100%);
      -webkit-background-clip: text;
              background-clip: text;
      -webkit-text-fill-color: transparent;
      filter:
        drop-shadow(0 0 38px rgba(231,194,133,0.30))
        drop-shadow(0 4px 0 rgba(0,0,0,0.45));
      opacity: 0; animation: fadeUp 0.9s ease 0.5s forwards, brandPulse 6.5s ease-in-out 1.4s infinite;
    }
    @keyframes brandPulse {
      0%, 100% { filter: drop-shadow(0 0 28px rgba(231,194,133,0.22)) drop-shadow(0 4px 0 rgba(0,0,0,0.45)); }
      50%      { filter: drop-shadow(0 0 56px rgba(255,215,150,0.50)) drop-shadow(0 4px 0 rgba(0,0,0,0.45)); }
    }

    .subtitle {
      font-family: 'Crimson Text', serif; font-size: 18px; font-style: italic;
      color: var(--text-sec); margin-bottom: 52px;
      opacity: 0; animation: fadeUp 0.9s ease 0.7s forwards;
    }

    /* ── Steps list ── */
    .steps {
      display: flex; flex-direction: column; gap: 14px;
      width: 100%; max-width: 460px; margin-bottom: 42px;
      opacity: 0; animation: fadeUp 0.9s ease 1s forwards;
    }

    .step {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 18px;
      border: 1px solid rgba(201,169,110,0.08);
      background: rgba(8,10,16,0.5);
      transition: border-color 0.4s, background 0.4s;
    }
    .step.active {
      border-color: rgba(201,169,110,0.3);
      background: rgba(12,14,22,0.8);
    }
    .step.done {
      border-color: rgba(201,169,110,0.15);
      background: rgba(8,10,16,0.3);
    }

    .step-icon {
      width: 22px; height: 22px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .step-icon.pending { color: rgba(201,169,110,0.2); }
    .step-icon.spinning {
      color: var(--gold);
      animation: spin 1.2s linear infinite;
    }
    .step-icon.check { color: rgba(201,169,110,0.7); }

    .step-label {
      font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 0.08em;
      color: var(--text-sec); transition: color 0.3s;
    }
    .step.active .step-label { color: var(--text); }
    .step.done .step-label { color: rgba(232,217,188,0.45); }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%; max-width: 460px;
      opacity: 0; animation: fadeUp 0.9s ease 1.1s forwards;
    }
    .progress-track {
      width: 100%; height: 2px;
      background: rgba(201,169,110,0.08); overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, rgba(201,169,110,0.4), rgba(201,169,110,0.9));
      transition: width 0.6s ease;
    }
    .progress-label {
      margin-top: 10px; font-family: 'Cinzel', serif; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold-dim); text-align: center;
      min-height: 16px;
    }

    /* ── Enter button (shown when done) ── */
    .enter-btn {
      margin-top: 36px;
      font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: #f0e0c0; background: rgba(80,44,12,0.7);
      border: 1px solid rgba(201,169,110,0.5); padding: 14px 40px;
      cursor: pointer; opacity: 0;
      transition: opacity 0.6s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      pointer-events: none;
    }
    .enter-btn.visible {
      opacity: 1; pointer-events: auto;
    }
    .enter-btn:hover {
      background: rgba(110,60,14,0.9);
      border-color: rgba(201,169,110,0.8);
      box-shadow: 0 0 32px rgba(201,169,110,0.15);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; } 50% { opacity: 1; }
    }

    /* ── Ornament ── */
    .ornament {
      display: flex; align-items: center; gap: 16px;
      width: 100%; max-width: 460px; margin-bottom: 32px;
      opacity: 0; animation: fadeUp 0.9s ease 0.9s forwards;
    }
    .ornament::before, .ornament::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3));
    }
    .ornament::after { background: linear-gradient(90deg, rgba(201,169,110,0.3), transparent); }
    .ornament-diamond { color: rgba(201,169,110,0.5); font-size: 12px; }
  </style>
</head>
<body class="cine">

<div class="bg-map" id="bg-map"></div>
<div class="bg-vignette"></div>
<div class="bg-seer" id="bg-seer"></div>

<div class="content">
  <div class="eyebrow">Aeloria</div>
  <div class="main-title">Shaping the World</div>
  <div class="subtitle">The age is being written&hellip;</div>

  <div class="ornament"><span class="ornament-diamond">◆</span></div>

  <div class="steps" id="steps">
    <div class="step done" id="step-0">
      <div class="step-icon check">✓</div>
      <div class="step-label">World assembled — factions seated</div>
    </div>
    <div class="step" id="step-1">
      <div class="step-icon pending" id="icon-1">◦</div>
      <div class="step-label">Running the opening age</div>
    </div>
    <div class="step" id="step-2">
      <div class="step-icon pending" id="icon-2">◦</div>
      <div class="step-label">Seeding rulers, dynasties &amp; chronicles</div>
    </div>
    <div class="step" id="step-3">
      <div class="step-icon pending" id="icon-3">◦</div>
      <div class="step-label">Populating the god panel</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">Preparing&hellip;</div>
  </div>

  <button class="enter-btn" id="enter-btn" onclick="window.location.href='/'">Enter the World</button>
</div>

<script>
(function () {
  const progress = document.getElementById('progress-fill');
  const label    = document.getElementById('progress-label');
  const enterBtn = document.getElementById('enter-btn');

  function setProgress(pct, text) {
    progress.style.width = pct + '%';
    label.textContent = text;
  }

  function setStep(idx, state) {
    const step = document.getElementById('step-' + idx);
    const icon = document.getElementById('icon-' + idx);
    if (!step || !icon) return;
    step.className = 'step ' + state;
    if (state === 'active')  { icon.className = 'step-icon spinning'; icon.textContent = '↻'; }
    if (state === 'done')    { icon.className = 'step-icon check';    icon.textContent = '✓'; }
    if (state === 'pending') { icon.className = 'step-icon pending';  icon.textContent = '◦'; }
  }

  async function run() {
    // Fade in map and seer after a beat
    setTimeout(() => document.getElementById('bg-map').classList.add('visible'), 400);
    setTimeout(() => document.getElementById('bg-seer').classList.add('visible'), 800);

    await delay(1200);
    setProgress(10, 'Opening the age…');

    // Step 1: run the first tick (Claude generates narrative)
    setStep(1, 'active');
    setProgress(20, 'Awakening the simulation…');

    let tickOk = false;
    try {
      const r = await fetch('/api/tick', { method: 'POST' });
      tickOk = r.ok;
    } catch { /* swallow — world is still playable */ }

    setStep(1, 'done');
    setProgress(60, 'Tick complete — binding the chronicles…');
    await delay(600);

    // Step 2: seed rulers/dynasties are already in world_state; just confirm
    setStep(2, 'active');
    setProgress(72, 'Seeding dynasties and chronicles…');
    await delay(900);
    setStep(2, 'done');
    setProgress(82, 'Rulers seated…');
    await delay(400);

    // Step 3: pre-fetch god panel so it's warm
    setStep(3, 'active');
    setProgress(90, 'Populating the god panel…');
    try { await fetch('/api/god/panel'); } catch { /* best effort */ }
    await delay(700);
    setStep(3, 'done');
    setProgress(100, 'The world is ready.');
    await delay(500);

    // Show enter button
    label.textContent = tickOk
      ? 'The age has begun. Your world awaits.'
      : 'World assembled. Enter when ready.';
    enterBtn.classList.add('visible');

    // Auto-enter after 2.5s if user doesn't click
    setTimeout(() => { window.location.href = '/'; }, 2500);
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  run();
})();
</script>
</body>
</html>
