services:
  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    env_file:
      - .env
    environment:
      PORT: 5000
      MAP_PUBLIC_URL: /map
    restart: unless-stopped
    volumes:
      - ./history:/app/history
      - ./logs:/app/logs
      - ./lore:/app/lore
      - ./weekly_stories:/app/weekly_stories
      - ./conversations:/app/conversations
      - ./static/audio:/app/static/audio
      - ./world_state.json:/app/world_state.json
      - ./pending_lore.json:/app/pending_lore.json
      - ./god_actions.json:/app/god_actions.json
      - ./narrative_synopsis.txt:/app/narrative_synopsis.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  next:
    build:
      context: .
      dockerfile: Dockerfile.next
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      flask:
        condition: service_healthy
      next:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
